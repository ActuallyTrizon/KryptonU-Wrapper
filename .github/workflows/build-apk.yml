name: Build Krypton Fork APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Important if Krypton uses sub-libraries

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Android NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34 # Matches your Honor X6b (Android 14)
          build-tools: 34.0.0
          ndk-version: 26.1.10909125 # Standard stable NDK

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace
        env:
          # This ensures the compiler targets the Helio G85's architecture
          ANDROID_NDK_HOME: ${{ steps.setup-android.outputs.ndk-path }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Krypton-Fork-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
